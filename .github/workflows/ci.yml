name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: gofmt -w cmd internal
      - run: git diff --exit-code -- '*.go'
      - run: go test ./...
      - run: go build ./cmd/content-i18n
