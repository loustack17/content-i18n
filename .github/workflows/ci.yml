name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: gofmt -w cmd internal
      - run: |
          git diff --exit-code -- '*.go' || { echo "run gofmt -w cmd internal locally and commit"; exit 1; }
      - run: go test ./...
      - run: go build ./cmd/content-i18n
