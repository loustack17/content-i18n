name: na-devops-platform
voice:
  audience: "North American DevOps, Platform, SRE, and backend engineering readers"
  tone: "clear, practical, technically precise"
  rewrite_level: "translate and adapt for natural English readability, not literal machine translation"
prefer_terms:
  - deployment
  - rollout
  - rollback
  - production
  - staging
  - reliability
  - incident
  - troubleshooting
  - observability
  - least privilege
  - service account
  - workload identity federation
  - CI/CD pipeline
avoid:
  - unexplained acronyms
  - literal source-language sentence order
  - resume-sounding exaggeration
  - tutorial filler
rules:
  titles: "Translate titles into natural technical English. Keep the original meaning."
  headings: "Keep heading hierarchy exactly. Translate heading text for clarity. Do not add, remove, merge, or split heading levels."
  code: "Do not translate code, commands, config keys, package names, API names, resource names, or error strings."
  links: "Preserve URLs exactly. Translate link text when the source-language text would be unclear to English readers."
  frontmatter: "Translate title, description, summary, keywords. Preserve date, slug, aliases, tags as-is."
  structure: "Preserve paragraph count, list count and nesting, table dimensions, blockquotes, and horizontal rules. Prose within each element may be rewritten for clarity."
  examples: "Keep all examples and code samples in the same order. Translate surrounding explanatory text for clarity."
  argument_flow: "Keep the source's section order and reasoning flow. Do not reorder, merge, or split sections."
  style_class: "Match the source's genre (debugging walkthrough, tutorial, post-mortem, etc.). Do not add editorial commentary, opinions, or summaries absent from the source."
